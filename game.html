<h1> DEV: lang ganteng wok</h1>
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe 2 Player</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
      overflow:hidden;
    }

    .bg-animation{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      animation: float 12s linear infinite;
    }

    .circle:nth-child(1){
      width:120px;
      height:120px;
      left:10%;
      animation-duration:12s;
    }

    .circle:nth-child(2){
      width:200px;
      height:200px;
      left:70%;
      animation-duration:16s;
    }

    .circle:nth-child(3){
      width:150px;
      height:150px;
      left:40%;
      animation-duration:14s;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) rotate(0deg);
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding:30px;
      border-radius:25px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
      animation: popup 1s ease;
    }

    @keyframes popup{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    h1{
      color:white;
      margin-bottom:15px;
      font-size:38px;
      text-shadow:0 0 10px cyan;
    }

    .status{
      color:#fff;
      margin-bottom:20px;
      font-size:20px;
      font-weight:bold;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,110px);
      gap:12px;
      justify-content:center;
    }

    .cell{
      width:110px;
      height:110px;
      background:rgba(255,255,255,0.12);
      border:2px solid rgba(255,255,255,0.2);
      border-radius:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:55px;
      color:white;
      cursor:pointer;
      transition:0.3s;
      animation: fadeIn 0.5s ease;
    }

    .cell:hover{
      transform:scale(1.07);
      background:rgba(255,255,255,0.2);
      box-shadow:0 0 15px cyan;
    }

    .cell.x{
      color:#38bdf8;
      text-shadow:0 0 15px #38bdf8;
      animation: pop 0.2s ease;
    }

    .cell.o{
      color:#f472b6;
      text-shadow:0 0 15px #f472b6;
      animation: pop 0.2s ease;
    }

    @keyframes pop{
      0%{
        transform:scale(0.5);
      }
      100%{
        transform:scale(1);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:15px;
      background:linear-gradient(45deg,#06b6d4,#3b82f6);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px cyan;
    }

    .winner-animation{
      animation: glow 1s infinite alternate;
    }

    @keyframes glow{
      from{
        box-shadow:0 0 10px yellow;
      }
      to{
        box-shadow:0 0 30px gold;
      }
    }

    @media(max-width:500px){
      .board{
        grid-template-columns:repeat(3,90px);
      }

      .cell{
        width:90px;
        height:90px;
        font-size:45px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Giliran Player X</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button onclick="restartGame()">Main Lagi</button>
  </div>

  <script>
    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");

    let currentPlayer = "X";
    let gameActive = true;
    let board = ["","","","","","","","",""];

    const winPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    cells.forEach(cell => {
      cell.addEventListener("click", handleClick);
    });

    function handleClick(){
      const index = this.dataset.index;

      if(board[index] !== "" || !gameActive) return;

      board[index] = currentPlayer;
      this.textContent = currentPlayer;
      this.classList.add(currentPlayer.toLowerCase());

      checkWinner();

      if(gameActive){
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.textContent = `Giliran Player ${currentPlayer}`;
      }
    }

    function checkWinner(){
      let winnerFound = false;

      winPatterns.forEach(pattern => {
        const [a,b,c] = pattern;

        if(
          board[a] &&
          board[a] === board[b] &&
          board[a] === board[c]
        ){
          winnerFound = true;

          cells[a].classList.add("winner-animation");
          cells[b].classList.add("winner-animation");
          cells[c].classList.add("winner-animation");

          statusText.textContent = `🎉 Player ${currentPlayer} Menang!`;
          gameActive = false;
        }
      });

      if(!winnerFound && !board.includes("")){
        statusText.textContent = "😅 Hasil Seri!";
        gameActive = false;
      }
    }

    function restartGame(){
      board = ["","","","","","","","",""];
      gameActive = true;
      currentPlayer = "X";

      statusText.textContent = "Giliran Player X";

      cells.forEach(cell => {
        cell.textContent = "";
        cell.className = "cell";
      });
    }
  </script>

</body>
</html>
